<svg version="1.2"
    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 2200" width="100%" height="100%">
    <style>
        .s0 { 
            fill: none;
            stroke-miterlimit: 10;
            stroke-width: 4; 
            stroke-linecap: round;
            opacity:0.5;
            stroke-linejoin: round;
            
            /* The 'drawForward' cycle makes the line "chase" itself */
            stroke-dasharray: 4000; 
            stroke-dashoffset: 4000;
            
            /* 'linear' keeps the speed constant so the loop point is seamless */
            animation: 
                drawForward 10s linear infinite, 
                colorCycle 15s linear infinite;
        }

        /* Staggered entrance for each path group creates layered complexity */
        g#Group_Inner > path:nth-child(1) { animation-delay: -2s; }
        g#Group_Inner > path:nth-child(2) { animation-delay: -4s; }

        /* Subtle, slow rotation of the whole group */
        #main-group {
            transform-origin: center;
            animation: slowRotate 80s linear infinite;
        }

        /* Gentle breathing effect on the main geometric shape */
        #Group_Inner {
            transform-origin: center;
            animation: breathe 12s ease-in-out infinite;
        }

        /* KEYFRAMES */
        @keyframes drawForward {
            0% {
                stroke-dashoffset: 4000; /* Fully hidden */
            }
            50% {
                stroke-dashoffset: 0;    /* Fully drawn */
            }
            100% {
                stroke-dashoffset: -4000; /* Hidden again by moving past the end */
            }
        }

        @keyframes colorCycle {
            0%   { stroke: #AB8846; } /* Gold */
            50%  { stroke: #FFFFFF; } /* White */
            100% { stroke: #AB8846; }
        }

        
    </style>
